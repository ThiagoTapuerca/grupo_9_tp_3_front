<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - PetShopardium</title>
    <link
      rel="shortcut icon"
      href="../assets/favicon/PetShopardium.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../css/components/styleLogin.css" />
    <link rel="stylesheet" href="../css/style.css" />

  <body>
    <header>
      <div id="menu-logo">
        <h1>Pet Shopardium</h1>
        <img
          src="../assets/favicon/PetShopardium.png"
          alt="Logo PetShopardium"
        />
      </div>

      <div id="menu-links">
        <nav>
          <a href="../index.html">Inicio</a>
          <a href="../pages/stock.html"> Stock</a>

        </nav>
      </div>
    </header>
    <main>
      <form action="perfil.html" method="GET">
        <h2>Acceso Clientes</h2>
        <div>
          <label>Email</label>
          <input type="email" required />
        </div>
        <div>
          <label>Contraseña</label>
          <input type="password" required />
        </div>
        <button type="submit">Ingresar</button>
        <p>¿No eres miembro? <a href="registro.html">Regístrate</a></p>
      </form>
    </main>
