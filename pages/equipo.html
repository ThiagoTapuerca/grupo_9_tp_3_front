<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestro Equipo de Proyecto</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            color: #333;
        }

        #seccion-equipo {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .integrante {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 200px;
            border: 1px solid #ccc;
        }

        .integrante img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }

        .nombre {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }

        .descripcion {
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <header>
        <h1>Personas que forman parte del proyecto</h1>
    </header>

    <main>
        <section id="seccion-equipo">
            
            <div class="integrante">
                <p class="nombre">Tiago De Rosa Cajarabilla</p>
                <p class="descripcion"></p>
            </div>

            <div class="integrante">
                <p class="nombre">Bautista Mazzante</p>
                <p class="descripcion"></p>
            </div>

            <div class="integrante">
                <p class="nombre">Thiago Tapuerca</p>
                <p class="descripcion"></p>
            </div>

            <div class="integrante">
                <p class="nombre">Santiago Vidal</p>
                <p class="descripcion"></p>
            </div>

            <div class="integrante">
                <p class="nombre">Franco Wilberger</p>
                <p class="descripcion"></p>
            </div>
        </section>
    </main>

</body>
</html>
