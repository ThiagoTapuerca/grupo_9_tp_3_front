<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto - Pet Shopardium</title>
    <meta
      name="description"
      content="Contáctanos en Pet Shopardium. Tienes dudas o sugerencias? ¡Estamos aquí para ayudarte!"
    />
    <link
      rel="shortcut icon"
      href="../assets/favicon/pasteleria_logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../css/general.css" />
  </head>
  <body>
    <!-- Estructura básica de una página web -->
    <header>
      <div id="menu-logo">
        <h1>Pet Shopardium</h1>
        <img
          src="../assets/favicon/pasteleria_logo.png"
          alt="Logo de Pastelería N°1"
        />
      </div>

      <div id="menu-links">
        <nav>
          <a href="../index.html">Inicio</a>
          <a href="../pages/servicios.html"> Servicios</a>
          <a href="../pages/equipo.html">Equipos</a>
          <a href="../pages/pedido.html">Realizar pedido</a>
          <a href="../pages/contacto.html">Consultas</a>
          <a href="../pages/faq.html">Preguntas frecuentes</a>
        </nav>
      </div>
    </header>

    <!-- Contenido principal de la página -->
    <main>
      <section id="form-pedido">
        <h2>Realizar un pedido </h2>

        <form>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />


          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" required />

         
          <br />

          <label for="tipo-producto">Tipo de producto</label>
          <select id="tipo-producto" name="producto">
            <option value = "" disabled selected>  </option>
            <option>Alimento perro</option>
            <option>Alimento gato</option>
            <option>Cepillo</option>
            <option>Comedero</option>
            <option>Collar</option>
            <option>Pelota</option>
          </select>

          <br />

          <p>Tamaño del pedido</p>

          <input type="radio" id="chico" name="tamano" />
          <label for="chico">Pequeño</label>

          <input type="radio" id="mediano" name="tamano" />
          <label for="mediano">Mediano</label>

          <input type="radio" id="grande" name="tamano" />
          <label for="grande">Grande</label>

          <br /><br />

          <label for="retiro">¿Cómo deseas retirar tu pedido?</label>
          <select id="retiro" name="retiro">
            <option value="" disabled selected>Selecciona una opción</option>
            <option>Retiro en tienda</option>
            <option>Entrega a domicilio</option>
          </select>

          <br /><br />

          <label for="comentarios">Detalles del pedido</label>
          <br /><br />
          <br /><br />
          <textarea id="comentarios" name="comentarios" rows="4"></textarea>

          <br /><br />

          <button type="submit">Enviar pedido</button>
          <button type="reset">Limpiar formulario</button>
        </form>
      </section>
    </main>

    <!-- Pie de página de la página -->
    <footer>
      <p>
        Copyright &copy; 2026 Pastelería N°1. Todos los derechos reservados.
      </p>
    </footer>
  </body>
</html>
