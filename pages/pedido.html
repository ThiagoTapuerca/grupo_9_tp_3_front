<!doctype html>
<html lang="es">
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuestro Equipo de Proyecto</title>
     <link
      rel="shortcut icon"
      href="../img/PetShopardium.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../css/stylePedidos.css" />
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header>
      <div id="menu-logo">
        <h1>Pet Shopardium</h1>
        <img
          src="../img/PetShopardium.png"
          alt="Logo de PetShopardium"
        />
      </div>

      <div id="menu-links">
        <nav>
          <a href="../index.html">Inicio</a>
          <a href="./stock.html"> Stock</a>
          <a href="./equipo.html">Equipo</a>
          <a href="./pedido.html">Realizar pedido</a>
          <a href="./contacto.html">Quienes somos</a>
          <a href="./faq.html">Preguntas frecuentes</a>
        </nav>
      </div>
    </header>

    <main>
      <section id="form-pedido">
        <h2>Realizar un pedido </h2>

        <form>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />


          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" required />

          <br />

          <label for="tipo-producto">Tipo de producto</label>
          <select id="tipo-producto" name="producto">
            <option value = "" disabled selected>  </option>
            <option>Alimento perro</option>
            <option>Alimento gato</option>
            <option>Cepillo</option>
            <option>Comedero</option>
            <option>Collar</option>
            <option>Pelota</option>
          </select>

          <br />

          <p>Tamaño del pedido</p>
          <div class="opciones-tamano">
              <input type="radio" id="chico" name="tamano" />
              <label for="chico">Pequeño</label>

              <input type="radio" id="mediano" name="tamano" />
              <label for="mediano">Mediano</label>

              <input type="radio" id="grande" name="tamano" />
              <label for="grande">Grande</label>
          </div>

          <br /><br />

          <label for="retiro">¿Cómo deseas retirar tu pedido?</label>
          <select id="retiro" name="retiro">
            <option value="" disabled selected>Selecciona una opción</option>
            <option>Retiro en tienda</option>
            <option>Entrega a domicilio</option>
          </select>

          <br /><br />
          <label for="comentarios"> Si seleciono envio a domicilio, ingrese su direccion</label>
          <br /><br />
          <label for="direccion">Dirección de envío</label>
          <input type="text" id="direccion" name="direccion" />
          <label for="Número">Número</label>
          <input type="text" id="Número" name="Número" />
          <br /><br />
          <label for="ciudad" >Ciudad</label>
          <input type="text" id="ciudad" name="ciudad" />
          <label for="provincia">Provincia</label>
          <input type="text" id="provincia" name="provincia" />
          <label for="codigo-postal">Código postal</label>
          <input type="text" id="codigo-postal" name="codigo-postal" />

          <br /><br />
          
          <label for="comentarios">Detalles del pedido, si tiene algun comentario para el envio o sobre el producto no dude en escribirlo</label>
          <br /><br />
          <textarea id="comentarios" name="comentarios" rows="4"></textarea>

          <br /><br />

          <button type="submit">Enviar pedido</button>
          <button type="reset">Limpiar formulario</button>
        </form>
      </section>
    </main>

    <footer>
      <p>
        Copyright &copy; 2026 Pet Shopardium. Todos los derechos reservados.
      </p>
    </footer>
  </body>
</html>
